spring:
  application:
    name: dashboard-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/message_db}
    username: ${SPRING_DATASOURCE_USERNAME:rocksat}
    password: ${SPRING_DATASOURCE_PASSWORD:odin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
